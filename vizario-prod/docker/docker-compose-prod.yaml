name: production

services:
  fastapi_server:
    build:
      context: /home/cc/mlops-pipeline-tandon/vizario-prod
      dockerfile: Dockerfile 
    container_name: fastapi_server
    ports:
      - "8000:8000"  # Map host port 8000 to container port 8000 for HTTP requests
    networks:
      - production_net
    depends_on:
      # Ensure Minio is running before starting the FastAPI server if it relies on it at startup
      - minio
    environment:
      - MINIO_URL=http://minio:9000         # Connect to the MinIO service by its service name and internal port on the Docker network
      - MINIO_USER=your-access-key          # Use the same Minio root user access key
      - MINIO_PASSWORD=your-secret-key      # Use the same Minio root user secret key
      - MINIO_BUCKET_NAME=production      # The target bucket name in Minio for saving data

  minio:
    image: minio/minio:latest # consider pinning to a specific version
    container_name: minio
    ports:
      - "9000:9000" # Map host port 9000 to container port 9000 (Minio API)
      - "9001:9001" # Map host port 9001 to container port 9001 (Minio Console UI)
    environment:
      - MINIO_ROOT_USER=your-access-key # Set your desired root access key
      - MINIO_ROOT_PASSWORD=your-secret-key # Set your desired root secret key
    volumes:
      # Use a named volume for persistent Minio data storage managed by Docker
      # - minio_data:/data
      - /mnt/block/minio_data:/data
    command: server /data --console-address ':9001' # Start the Minio server
    networks:
      - production_net
    
  minio-init:
    image: minio/mc
    container_name: minio_init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set myminio http://minio:9000 your-access-key your-secret-key &&
      mc mb -p myminio/production || echo 'Bucket already exists'
      "
    networks:
      - production_net

  labelstudio:
    image: heartexlabs/label-studio:latest # Use the official Label Studio image
    container_name: labelstudio
    restart: always # Keep Label Studio running
    ports:
      - "8080:8080" # Map host port 8080 to container port 8080 for the UI
    environment:
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_USERNAME=labelstudio@example.com
      - LABEL_STUDIO_PASSWORD=labelstudio
      - LABEL_STUDIO_USER_TOKEN=ab9927067c51ff279d340d7321e4890dc2841c4a
    networks:
      - production_net # Connect it to the same network as Minio and FastAPI
    volumes:
      # Mount a named volume for Label Studio's persistent data
      - labelstudio_data:/label-studio/data
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  jupyter:
    image: quay.io/jupyter/minimal-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    volumes:
      - /home/cc/mlops-pipeline-tandon/vizario-prod/workspace:/home/jovyan/work # mount workspace
    environment:
      - MINIO_URL=http://minio:9000 
      - MINIO_USER=your-access-key
      - MINIO_PASSWORD=your-secret-key
      - MINIO_BUCKET_NAME=production
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_USER_TOKEN=ab9927067c51ff279d340d7321e4890dc2841c4a
    networks:
      - production_net
    command: >
      bash -c "python3 -m pip install boto3 requests && start-notebook.sh"
    
networks:
  production_net:
    external: true

volumes:
  minio_data:  # Define named volume for Minio persistent data
  labelstudio_data: # Define the named volume for Label Studio data
